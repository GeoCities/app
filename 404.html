<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GeoCities</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
<script>
  // Fallback for gateways that ignore _redirects: route the attempted path
  // into a hash the SPA can parse (e.g. /vitalik.eth → /#/vitalik.eth).
  (function () {
    var p = location.pathname.replace(/^\/+/, '');
    location.replace('/#/' + p + location.search);
  })();
</script>
</head>
<body>Redirecting…</body>
</html>
