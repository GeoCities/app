<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https: http:;
        connect-src 'self' https://api.web3.bio https://api.ethfollow.xyz https://raw.githubusercontent.com https://cloudflare-eth.com https://api.pinata.cloud https://apiv5.paraswap.io;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
    ">
    <title>GeoCities</title>
    <link rel="icon" id="favicon" href="" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="GeoCities">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <nav class="nav-bar">
        <a href="#" class="nav-logo">
            <img id="nav-logo-img" src="" alt="GeoCities Logo">
        </a>
        <div class="nav-buttons">
            <button id="theme-toggle">Light</button>
            <!-- Settings and Coin dropdowns will be dynamically added here by script.js -->
        </div>
    </nav>
    <div class="container">
        <h1 id="homepage-geocities">GeoCities</h1>
        <div id="slogan-container" class="slogan-container">
            <span>Your </span><span id="cycling-word">identity</span>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Enter ENS or Basename">
            <button class="search-button">Search</button>
        </div>
        
        <!-- ENS Profiles Grid -->
        <div class="ens-grid-container" id="ens-grid">
            <!-- ENS profiles will be dynamically inserted here -->
        </div>
    </div>
    <div class="loading-spinner"></div>
    <div class="error-message"></div>
    <div id="profile-page">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Enter ENS or Basename">
            <button class="search-button">Search</button>
        </div>

        <div class="profile-container">
            <div class="profile-header-image">
                <!-- Header image will be inserted here -->
            </div>
            <div class="profile-card">
                <!-- Profile hero (avatar + name + bio) populated by displayProfile() -->
            </div>
            <div class="profile-actions">
                <!-- Action buttons (Follow | Crypto | Edit) populated by displayProfile() -->
            </div>
            <div class="profile-crypto-panel">
                <div class="crypto-tabs">
                    <button class="crypto-tab active" data-tab="receive">Receive</button>
                    <button class="crypto-tab" data-tab="send">Send</button>
                    <button class="crypto-tab" data-tab="swap">Swap</button>
                </div>
                <div class="crypto-tab-body active" id="crypto-receive-body">
                    <div class="crypto-qr-container"></div>
                    <div class="crypto-wallet-address"></div>
                    <button class="crypto-copy-btn dropdown-button">Copy Address</button>
                    <a class="crypto-explorer-btn dropdown-button" href="#" target="_blank" rel="noopener noreferrer">Etherscan</a>
                </div>
                <div class="crypto-tab-body" id="crypto-send-body">
                    <div class="edit-field">
                        <label>To (address or ENS name)</label>
                        <input type="text" id="send-to" placeholder="0x… or name.eth" autocomplete="off" spellcheck="false">
                    </div>
                    <div class="send-row">
                        <div class="edit-field" style="flex:1;">
                            <label>Amount</label>
                            <input type="number" id="send-amount" placeholder="0.0" min="0" step="any">
                        </div>
                        <div class="edit-field narrow">
                            <label>Token</label>
                            <select id="send-token" class="edit-field-select">
                                <option>ETH</option><option>USDC</option><option>USDT</option><option>DAI</option><option>ENS</option>
                            </select>
                        </div>
                    </div>
                    <button id="send-submit-btn" class="dropdown-button">Send</button>
                    <div id="send-status" class="crypto-status"></div>
                </div>
                <div class="crypto-tab-body" id="crypto-swap-body">
                    <div class="send-row">
                        <div class="edit-field" style="flex:1;">
                            <label>From</label>
                            <select id="swap-from" class="edit-field-select">
                                <option>ETH</option><option>USDC</option><option>USDT</option><option>DAI</option><option>WETH</option><option>ENS</option>
                            </select>
                        </div>
                        <div class="edit-field" style="flex:1;">
                            <label>Amount</label>
                            <input type="number" id="swap-amount" placeholder="0.0" min="0" step="any">
                        </div>
                    </div>
                    <div class="swap-arrow">↓</div>
                    <div class="send-row">
                        <div class="edit-field" style="flex:1;">
                            <label>To</label>
                            <select id="swap-to" class="edit-field-select">
                                <option>USDC</option><option>ETH</option><option>USDT</option><option>DAI</option><option>WETH</option><option>ENS</option>
                            </select>
                        </div>
                        <div class="edit-field" style="flex:1;">
                            <label>Est. receive</label>
                            <div id="swap-estimate" class="swap-estimate-val">—</div>
                        </div>
                    </div>
                    <button id="swap-quote-btn" class="dropdown-button">Get Quote</button>
                    <button id="swap-exec-btn" class="dropdown-button" style="display:none;">Swap</button>
                    <div id="swap-status" class="crypto-status"></div>
                </div>
            </div>
            <div class="profile-records">
                <!-- ENS records will be inserted here -->
            </div>
            <div class="profile-number-records">
                <!-- Number records will be inserted here -->
            </div>
            <!-- Hidden controls for JavaScript functionality - completely hidden -->
            <div class="download-website-container" style="display: none; visibility: hidden; position: absolute; pointer-events: none;">
                <input type="color" id="bg-color" class="color-picker">
                <input type="color" id="text-color" class="color-picker">
                <input type="color" id="border-color" class="color-picker">
                <select id="effect-select" class="effect-select">
                    <option value="none">Effect</option>
                    <option value="glow">Glow</option>
                    <option value="snow">Snow</option>
                    <option value="stars">Stars</option>
                    <option value="rainbow">Rainbow</option>
                    <option value="matrix">Matrix</option>
                    <option value="neon">Neon</option>
                    <option value="vaporware">Vaporware</option>
                </select>
            </div>
        </div>
    </div>
    <footer class="footer">
        <a href="https://geocities.eth.link" target="_blank" rel="noopener noreferrer">GeoCities</a>
    </footer>

    <!-- Wallet selection modal -->
    <div id="wallet-modal" class="wallet-modal-overlay" role="dialog" aria-modal="true" aria-label="Connect Wallet">
        <div class="wallet-modal-card">
            <div class="wallet-modal-header">
                <span>Connect Wallet</span>
                <button id="wallet-modal-close" class="wallet-modal-close" aria-label="Close">&#x2715;</button>
            </div>
            <div id="wallet-modal-list" class="wallet-modal-list"></div>
        </div>
    </div>

    <!-- Edit ENS Records modal -->
    <div id="edit-records-modal" class="edit-modal-overlay" role="dialog" aria-modal="true" aria-label="Edit Records">
        <div class="edit-modal-card">
            <div class="edit-modal-header">
                <span>Edit Records</span>
                <button id="edit-modal-close" class="wallet-modal-close" aria-label="Close">&#x2715;</button>
            </div>
            <div id="edit-modal-body" class="edit-modal-body"></div>
            <div class="edit-modal-footer">
                <button id="edit-modal-save" class="dropdown-button edit-modal-save-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- IPFS Deploy modal -->
    <div id="ipfs-modal" class="wallet-modal-overlay" role="dialog" aria-modal="true">
        <div class="wallet-modal-card">
            <div class="wallet-modal-header">
                <span>Deploy to IPFS</span>
                <button id="ipfs-modal-close" class="wallet-modal-close">&#x2715;</button>
            </div>
            <div id="ipfs-modal-body" class="edit-modal-body"></div>
            <div class="edit-modal-footer">
                <button id="ipfs-deploy-btn" class="dropdown-button edit-modal-save-btn">Upload &amp; Deploy</button>
            </div>
        </div>
    </div>

    <!-- ENS Register modal -->
    <div id="register-modal" class="wallet-modal-overlay" role="dialog" aria-modal="true">
        <div class="wallet-modal-card">
            <div class="wallet-modal-header">
                <span id="register-modal-title">Register ENS Name</span>
                <button id="register-modal-close" class="wallet-modal-close">&#x2715;</button>
            </div>
            <div id="register-modal-body" class="edit-modal-body"></div>
            <div class="edit-modal-footer">
                <button id="register-submit-btn" class="dropdown-button edit-modal-save-btn" style="display:none;">Register</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
